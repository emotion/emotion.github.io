name: Deploy Quartz site to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build Quartz
        run: npx quartz build

      - name: Convert slug.html to slug/index.html for GitHub Pages
        run: |
          shopt -s nullglob
          for f in public/*.html; do
            name=$(basename "$f" .html)
            if [ "$name" != "index" ] && [ "$name" != "404" ]; then
              mkdir -p "public/$name"
              mv "$f" "public/$name/index.html"
            fi
          done

      - name: Preserve CNAME
        run: |
          if [ -f CNAME ]; then
            cp CNAME public/CNAME
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
